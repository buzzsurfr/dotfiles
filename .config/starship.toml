# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'
format = """
$all\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$character"""
